<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Work Hours Tracker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        .status-badge {
            display: inline-block;
            background-color: #e6f4ea;
            color: #137333;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }
        .status-badge::before {
            content: "● ";
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        h1 {
            font-size: 2.5rem;
            margin: 0 0 0.5rem 0;
            color: #1a73e8;
        }
        p {
            color: #666;
            margin-bottom: 2rem;
        }
        .log-box {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 6px;
            padding: 1rem;
            text-align: left;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.9rem;
        }
        .log-entry {
            border-bottom: 1px solid #edf0f2;
            padding: 4px 0;
        }
        .log-entry:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="status-badge">Auto-Tracking Active</div>
    <p>Total Billable Time Today</p>
    <h1 id="display">00h 00m 00s</h1>
    
    <h3 style="text-align: left; margin-top: 2rem; font-size: 1rem; color: #444;">Session Logs:</h3>
    <div class="log-box" id="logBox">
        <div class="log-entry" style="color: #888;">System initialized. Waiting for lid close...</div>
    </div>
</div>

<script>
    let totalWorkedMs = 0;
    let sessionStartTime = Date.now();
    let lastPingTime = Date.now();

    const display = document.getElementById('display');
    const logBox = document.getElementById('logBox');

    // Update the timer UI every second
    setInterval(() => {
        const currentTime = Date.now();
        const timePassedSinceLastLoop = currentTime - lastPingTime;

        // GAP DETECTION: If the interval loop took more than 5 seconds to run,
        // it means the laptop lid was closed and it just woke up.
        if (timePassedSinceLastLoop > 5000) {
            // 1. Calculate exactly how long the session lasted before sleep
            const sessionDuration = lastPingTime - sessionStartTime;
            totalWorkedMs += sessionDuration;

            // 2. Log the completed session to the screen for your records
            logSession(sessionStartTime, lastPingTime);

            // 3. Start a brand new session right now upon wake-up
            sessionStartTime = currentTime;
        } else {
            // Normal operation: Add the exact time elapsed to the temporary running counter
            const currentSessionDuration = currentTime - sessionStartTime;
            updateDisplay(totalWorkedMs + currentSessionDuration);
        }

        lastPingTime = currentTime;
    }, 1000);

    function updateDisplay(ms) {
        const totalSeconds = Math.floor(ms / 1000);
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        display.textContent = 
            `${String(hours).padStart(2, '0')}h ` +
            `${String(minutes).padStart(2, '0')}m ` +
            `${String(seconds).padStart(2, '0')}s`;
    }

    function logSession(start, end) {
        const startTimeStr = new Date(start).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        const endTimeStr = new Date(end).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        
        const durationSec = Math.floor((end - start) / 1000);
        const mins = Math.floor(durationSec / 60);
        const secs = durationSec % 60;

        const entry = document.createElement('div');
        entry.className = 'log-entry';
        entry.innerHTML = `<strong>Worked:</strong> ${startTimeStr} - ${endTimeStr} (${mins}m ${secs}s)`;
        
        // Add to the top of the logs
        logBox.insertBefore(entry, logBox.firstChild);
    }

    // Optional: Log the very final session if you manually refresh or close the tab
    window.addEventListener('beforeunload', () => {
        const sessionDuration = Date.now() - sessionStartTime;
        totalWorkedMs += sessionDuration;
    });
</script>

</body>
</html>
